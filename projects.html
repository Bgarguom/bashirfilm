    <main>
        <section class="projects-page">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="config.js" defer></script>
    <script src="public-api.js" defer></script>
    <script src="script.js?v=3.0" defer></script>
    <script>
        // Load all projects on projects page after scripts are loaded
        function initProjectsPage() {
            if (typeof loadAllProjects === 'function' && document.getElementById('all-projects-grid')) {
                loadAllProjects();
            } else if (document.getElementById('all-projects-grid')) {
                // Retry if scripts not loaded yet
                setTimeout(initProjectsPage, 100);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initProjectsPage);
        } else {
            initProjectsPage();
        }
    </script>
