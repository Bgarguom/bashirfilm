    <script>
        // Load project details on project page after scripts are loaded
        function initProjectPage() {
            if (typeof loadProjectDetails === 'function' && document.getElementById('project-content')) {
                loadProjectDetails();
            } else if (document.getElementById('project-content')) {
                // Retry if scripts not loaded yet
                setTimeout(initProjectPage, 100);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initProjectPage);
        } else {
            initProjectPage();
        }
