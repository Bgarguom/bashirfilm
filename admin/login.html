<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bashir Garguom</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <h1 class="admin-login-title">Admin Login</h1>
            <form id="login-form" class="admin-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="admin@bashirgarguom.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" value="admin0902" required autocomplete="current-password">
                </div>
                <div id="login-error" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        // Initialize Supabase
        initSupabase();
        
        // Check if already logged in (only if Supabase is configured)
        if (typeof getSupabase === 'function') {
            try {
                const supabase = getSupabase();
                if (supabase) {
                    supabase.auth.getSession().then(({ data: { session } }) => {
                        if (session) {
                            window.location.href = 'dashboard.html';
                        }
                    });
                }
            } catch (error) {
                // Supabase not configured - allow direct access to dashboard
                console.log('Supabase not configured - you can access dashboard directly');
            }
        }

        // Handle login form
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                const { data, error } = await getSupabase().auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'Login failed. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
